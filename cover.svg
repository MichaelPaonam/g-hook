<svg xmlns="http://www.w3.org/2000/svg" width="630" height="500" viewBox="0 0 630 500">
  <defs>
    <!-- Dark space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- Speed aura glow -->
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ff4400" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Hook glow -->
    <radialGradient id="hook_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ccff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Cable gradient -->
    <linearGradient id="cable1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0044cc" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="cable2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ddff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0077ff" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Title glow filter -->
    <filter id="glow_orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow_blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow_white" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="title_glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for border -->
    <clipPath id="border_clip">
      <rect x="0" y="0" width="630" height="500" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="630" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines (top-down arena feel) -->
  <g opacity="0.06" stroke="#4488ff" stroke-width="1" clip-path="url(#border_clip)">
    <line x1="0" y1="83" x2="630" y2="83"/>
    <line x1="0" y1="166" x2="630" y2="166"/>
    <line x1="0" y1="249" x2="630" y2="249"/>
    <line x1="0" y1="332" x2="630" y2="332"/>
    <line x1="0" y1="415" x2="630" y2="415"/>
    <line x1="105" y1="0" x2="105" y2="500"/>
    <line x1="210" y1="0" x2="210" y2="500"/>
    <line x1="315" y1="0" x2="315" y2="500"/>
    <line x1="420" y1="0" x2="420" y2="500"/>
    <line x1="525" y1="0" x2="525" y2="500"/>
  </g>

  <!-- Wall blocks (arena geometry) -->
  <g fill="#1e2d4a" stroke="#2a4070" stroke-width="1.5" opacity="0.8">
    <!-- Top-left block cluster -->
    <rect x="40" y="80" width="60" height="20"/>
    <rect x="40" y="100" width="20" height="60"/>
    <!-- Bottom-right cluster -->
    <rect x="530" y="380" width="60" height="20"/>
    <rect x="570" y="340" width="20" height="40"/>
    <!-- Mid obstacles -->
    <rect x="200" y="200" width="30" height="80"/>
    <rect x="400" y="160" width="80" height="25"/>
    <rect x="130" y="330" width="70" height="20"/>
    <!-- Corner pieces -->
    <rect x="500" y="80" width="80" height="20"/>
    <rect x="560" y="100" width="20" height="50"/>
    <rect x="50" y="380" width="80" height="20"/>
  </g>

  <!-- Anchor points -->
  <g filter="url(#glow_blue)">
    <!-- Anchor 1: top area -->
    <circle cx="160" cy="110" r="8" fill="#1166cc" stroke="#00aaff" stroke-width="2"/>
    <circle cx="160" cy="110" r="3" fill="#88ddff"/>
    <!-- Anchor 2: right side -->
    <circle cx="480" cy="200" r="8" fill="#1166cc" stroke="#00aaff" stroke-width="2"/>
    <circle cx="480" cy="200" r="3" fill="#88ddff"/>
    <!-- Anchor 3: center top -->
    <circle cx="330" cy="130" r="8" fill="#1166cc" stroke="#00aaff" stroke-width="2"/>
    <circle cx="330" cy="130" r="3" fill="#88ddff"/>
  </g>

  <!-- Speed aura (behind player) -->
  <ellipse cx="315" cy="285" rx="55" ry="55" fill="url(#aura)" opacity="0.85"/>
  <!-- Aura particles -->
  <g opacity="0.7" filter="url(#glow_orange)">
    <circle cx="295" cy="258" r="3" fill="#ff8800"/>
    <circle cx="338" cy="252" r="2" fill="#ff6600"/>
    <circle cx="350" cy="275" r="2.5" fill="#ff4400"/>
    <circle cx="280" cy="290" r="2" fill="#ff8800"/>
    <circle cx="345" cy="305" r="3" fill="#ff6600"/>
    <circle cx="290" cy="315" r="2" fill="#ff4400"/>
    <circle cx="310" cy="248" r="2" fill="#ffaa00"/>
    <circle cx="360" cy="290" r="2" fill="#ff5500"/>
    <circle cx="268" cy="272" r="2.5" fill="#ff7700"/>
    <circle cx="325" cy="320" r="2" fill="#ff3300"/>
  </g>

  <!-- Cables (2 active) -->
  <!-- Cable to anchor 1 (top-left area) -->
  <line x1="315" y1="285" x2="160" y2="110"
        stroke="url(#cable1)" stroke-width="2.5" filter="url(#glow_blue)" opacity="0.9"/>
  <!-- Cable to anchor 2 (right) -->
  <line x1="315" y1="285" x2="480" y2="200"
        stroke="url(#cable2)" stroke-width="2.5" filter="url(#glow_blue)" opacity="0.9"/>

  <!-- Velocity trail (motion blur effect) -->
  <g opacity="0.25">
    <ellipse cx="300" cy="295" rx="18" ry="12" fill="#ff6600" transform="rotate(-35 300 295)"/>
    <ellipse cx="287" cy="304" rx="12" ry="7" fill="#ff4400" transform="rotate(-35 287 304)"/>
  </g>

  <!-- Player body (top-down square sprite) -->
  <g filter="url(#glow_orange)">
    <rect x="304" y="274" width="22" height="22" rx="3" fill="#e86020" stroke="#ffaa44" stroke-width="1.5"/>
    <!-- Player center dot -->
    <rect x="312" y="282" width="6" height="6" rx="1" fill="#ffddaa"/>
  </g>

  <!-- Checkpoint (glowing ring) -->
  <g filter="url(#glow_blue)" opacity="0.9">
    <circle cx="510" cy="360" r="22" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4"/>
    <circle cx="510" cy="360" r="10" fill="#003333" stroke="#00ddaa" stroke-width="1.5"/>
    <text x="510" y="365" text-anchor="middle" fill="#00ffcc" font-size="10" font-family="monospace" font-weight="bold">CP</text>
  </g>

  <!-- HUD elements (speed readout flavor) -->
  <g font-family="'Courier New', monospace" fill="#00ccff" opacity="0.75" font-size="11">
    <text x="24" y="26">SPD</text>
    <text x="52" y="26" fill="#ffffff" font-weight="bold">847</text>
    <text x="90" y="26" fill="#888888">px/s</text>
    <text x="180" y="26" fill="#666">|</text>
    <text x="194" y="26">CHAIN</text>
    <text x="242" y="26" fill="#ffaa00" font-weight="bold">x3</text>
    <text x="276" y="26" fill="#666">|</text>
    <text x="290" y="26">CABLE</text>
    <text x="338" y="26" fill="#00ffaa" font-weight="bold">2/3</text>
  </g>
  <!-- HUD line -->
  <line x1="16" y1="32" x2="614" y2="32" stroke="#1a3355" stroke-width="1" opacity="0.6"/>

  <!-- Timer (top right) -->
  <text x="606" y="26" text-anchor="end" font-family="'Courier New', monospace"
        fill="#ffcc00" font-size="12" opacity="0.8">12.45s</text>

  <!-- Title: G-HOOK -->
  <g filter="url(#title_glow)">
    <!-- Shadow/glow layer -->
    <text x="315" y="455" text-anchor="middle"
          font-family="'Arial Black', 'Impact', sans-serif"
          font-size="82" font-weight="900" letter-spacing="12"
          fill="#ff4400" opacity="0.4">G-HOOK</text>
    <!-- Main title -->
    <text x="315" y="455" text-anchor="middle"
          font-family="'Arial Black', 'Impact', sans-serif"
          font-size="82" font-weight="900" letter-spacing="12"
          fill="#ff6600">G</text>
    <text x="370" y="455" text-anchor="middle"
          font-family="'Arial Black', 'Impact', sans-serif"
          font-size="82" font-weight="900" letter-spacing="12"
          fill="#ff7700">-</text>
    <text x="406" y="455" text-anchor="middle"
          font-family="'Arial Black', 'Impact', sans-serif"
          font-size="82" font-weight="900" letter-spacing="12"
          fill="#ffaa00">HOOK</text>
  </g>

  <!-- Subtitle -->
  <text x="315" y="480" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="13" letter-spacing="5"
        fill="#aaccff" opacity="0.7">GRAPPLING HOOK TIME TRIAL</text>

  <!-- Decorative corner brackets -->
  <g stroke="#1e3a5a" stroke-width="2" fill="none" opacity="0.6">
    <!-- Top-left -->
    <polyline points="12,28 12,12 28,12"/>
    <!-- Top-right -->
    <polyline points="602,28 602,12 586,12"/>
    <!-- Bottom-left -->
    <polyline points="12,472 12,488 28,488"/>
    <!-- Bottom-right -->
    <polyline points="602,472 602,488 586,488"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="628" height="498" rx="8" fill="none"
        stroke="#1e3a5a" stroke-width="2" opacity="0.8"/>
</svg>
